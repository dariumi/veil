name: Build, Test & Publish

on:
  push:
    branches: [main, dev]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/veil-server

jobs:
  # ── Rust: check / test ────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libssh2-1-dev

      - name: Install macOS system deps
        if: runner.os == 'macOS'
        run: brew install libssh2 openssl pkg-config

      - name: Install Windows system deps
        if: runner.os == 'Windows'
        run: |
          vcpkg install openssl:x64-windows-static
          echo "OPENSSL_DIR=C:/vcpkg/installed/x64-windows-static" >> $GITHUB_ENV
          echo "OPENSSL_STATIC=1" >> $GITHUB_ENV

      - name: Format check
        run: |
          cargo fmt -p veil-core -- --check
          cargo fmt -p veil-server -- --check
          cargo fmt -p veil-client -- --check

      - name: Clippy (warnings allowed — not blocking)
        run: cargo clippy -p veil-core -p veil-server -p veil-client
        continue-on-error: true

      - name: Build
        run: cargo build --release -p veil-core -p veil-server -p veil-client

      - name: Test
        run: cargo test -p veil-core -p veil-server -p veil-client

  # ── Build desktop app (Tauri) ─────────────────────────────────────────────
  tauri:
    name: Desktop App (${{ matrix.platform }})
    needs: test
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps (Tauri)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            pkg-config libssl-dev libssh2-1-dev

      - name: Install macOS deps
        if: runner.os == 'macOS'
        run: brew install libssh2 openssl

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: veil-app/src-tauri -> target

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Tauri CLI
        run: npm install --save-dev @tauri-apps/cli
        working-directory: veil-app

      - name: Build Tauri app
        run: npm run build
        working-directory: veil-app
        env:
          OPENSSL_STATIC: "1"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: veil-app-${{ matrix.platform }}
          path: veil-app/src-tauri/target/release/bundle/

  # ── Docker: build & push to ghcr.io ──────────────────────────────────────
  docker:
    name: Docker image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: veil-server/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ── GitHub Release (on tag push) ──────────────────────────────────────────
  release:
    name: Create Release
    needs: [tauri, docker]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            veil-app-ubuntu-22.04/**/*.deb
            veil-app-ubuntu-22.04/**/*.AppImage
            veil-app-macos-latest/**/*.dmg
            veil-app-windows-latest/**/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
